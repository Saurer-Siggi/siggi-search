name: Build and Deploy to Hetzner Webspace

# NOTE: This workflow deploys the static frontend only (no admin UI).
# Use deploy-vps.yml instead if you need the admin interface.
on:
  workflow_dispatch:  # manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to webspace via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/
          remote_path: ${{ secrets.WEBSPACE_PATH }}
          remote_host: ${{ secrets.WEBSPACE_HOST }}
          remote_user: ${{ secrets.WEBSPACE_USER }}
          remote_key: ${{ secrets.WEBSPACE_SSH_KEY }}
